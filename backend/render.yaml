services:
  - type: web
    name: cropsense-backend
    env: python
    plan: free
    buildCommand: pip install --upgrade pip setuptools wheel && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: FIREBASE_KEY
        sync: false
        # Important: User must set this JSON string in Rennder dashboard
